# Router configuration

# The IP address and port where the router will listen for incoming connections.
# Example: "127.0.0.1:8080"
listen-address = "127.0.0.1:8080"

# A list of base URLs for chain nodes that the router can connect to. 
# Round robin load balancing strategy will be employed between provided upstreams
base-chain-urls = ["http://127.0.0.1:8899"]

# The maximum number of delegation caches that the router will hold.
# Example: 1000
max-cached-delegations = 16384
# Maximum number of transaction to route mappings to keep in memory 
max-cached-transactions = 16384

# The maximum number of simultaneous connections that the router can handle.
# Example: 500
max-connections = 1024

# The maximum number of subscriptions allowed per connection.
# Example: 10
max-subscriptions-per-connection = 1024

# Frequency of ping requests, performed to upstream nodes, to determine their proximity (latency wise)
proximity-ping-frequency-sec = 30

# Configuration for Helius laser stream (to keep track of delegations)
[laser-stream]
endpoint = "https://laserstream-devnet-ewr.helius-rpc.com"
api-key = "9f424181-df7e-4069-be71-40896f62d9c5"

# WebSocket connection configuration
[websocket]
# The interval in seconds for sending ping messages to maintain WebSocket connections.
# Example: 30
ping-interval-sec = 30

# The number of connections established per upstream WebSocket server.
# Example: 5
connections-per-upstream = 5
