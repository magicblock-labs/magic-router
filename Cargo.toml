[package]
name = "bifrost"
version = "0.1.0"
edition = "2021"

[dependencies]
# runtime
tokio = { version = "1.0", features = [ "rt-multi-thread", "sync", "net", "macros" ] }

# net
hyper = { version = "1.0", features = [ "full" ] }
hyper-util = { version = "0.1" }
reqwest = { version = "0.12", default-features = false, features = [ "http2", "default-tls" ] }

# parsing
serde = { version = "1.0", features = [ "derive" ] }
json = { package = "sonic-rs", version = "0.3" } 
toml = { version = "0.8", default-features = false, features = [ "parse" ] }

# codec
base64 = "0.12"
bs58 = "0.5"
bincode = "1.3"

# solana
solana = { package = "solana-program", version = "2.1.1" }
