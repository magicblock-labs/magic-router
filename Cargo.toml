[package]
name = "magic-router"
description = "JSON-RPC Router for ephemeral rollups"
version = "0.1.0"
authors = ["Magicblock Labs <dev@magicblock.gg>"]
edition = "2021"
license = "MIT"
homepage = "https://www.magicblock.gg/"
documentation = "https://docs.magicblock.gg/"
repository = "https://github.com/magicblock-labs/magic-router"
readme = "./README.md"
keywords = ["solana", "crypto", "delegation", "ephemeral-rollups", "magicblock"]

[dependencies]
# runtime
tokio = { version = "1.0", features = [ "rt-multi-thread", "sync", "net", "macros", "signal" ] }
futures = "0.3"

# network
hyper = { version = "1.0", features = [ "full" ] }
hyper-util = { version = "0.1", features = [ "server-auto" ] }
reqwest = { version = "0.12", default-features = false, features = [ "http2", "default-tls" ] }
websocket = { package = "tokio-websockets", version = "0.10", features = [ "client", "simd", "native-tls", "fastrand", "openssl" ] }
url = { version = "2.5", features = [ "serde" ] }
http-body-util = "0.1"

# parsing
serde = { version = "1.0", features = [ "derive" ] }
json = { package = "sonic-rs", version = "0.3" } 
toml = { version = "0.8", default-features = false, features = [ "parse" ] }
humantime = "2.1"

# codec
base64 = "0.12"
bs58 = "0.5"
bincode = "1.3"
zstd = "0.13"

# synchronization
flume = "0.11"

# containers
scc = "2.2.5"
bytes = "1.8"

# logging
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = [ "env-filter", "json" ] }

# misc 
thiserror = "1.0"

# solana
pubkey = { package = "solana-pubkey", version = "2.1", default-features = false, features = [ "curve25519", "serde" ] }
shortvec = { package = "solana-short-vec", version = "2.1" }
solana-hash = { version = "2.1", default-features = false, features = [ "serde" ] }
solana-sdk = "2.1"

[profile.release]
opt-level = 3
# lto = "fat"               
codegen-units = 1        
panic = "abort"           
# incremental = false           
strip = "symbols"

